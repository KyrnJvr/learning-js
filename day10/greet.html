<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greet</title>
</head>
<body>
    <h1 id="nameField"></h1>
    <h1 id="greetField"></h1>
    <script>

        let nameField = document.getElementById('nameField');
        let greetings = document.getElementById('greetField');

        function greet(){
            let username = prompt('Enter your name: ');

            nameField.innerText = `Name entered: ${username}`;
            greetings.innerText = `Hello ${username}!`;

        }

        greet();
    </script>
</body>
</html>
