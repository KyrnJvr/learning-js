<body>
    Day 02 - Learning JavaScript
    <script>
        let name = 'John';
        const mybirthday = '07-98-2000';
        let isStudent = true;

        console.log("Hello " + name); // can use + or , to concatenate 
        console.log(name , "your birthday is on:", mybirthday);
        console.log("is",name,"a student?:",isStudent);

        // null and undefined data types

        let a;
        console.log("value of a:", a) // undefined
        console.log('type of a:',typeof a); // "undefined"

        let b = null;
        console.log('value of b:', b); // null
        console.log('type of b:', typeof b); // "object"
    </script>
